<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JT Invoice Lite</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f5f5;font-family:Arial,sans-serif;color:#111;padding:14px}
.wrap{max-width:980px;margin:auto;display:grid;grid-template-columns:360px 1fr;gap:14px}
.card{background:#fff;border-radius:18px;padding:16px;box-shadow:0 8px 24px #0001}
h1{font-size:22px;margin:0 0 4px}.hint{font-size:12px;color:#666;line-height:1.4;margin:0 0 10px}
label{display:block;font-size:12px;font-weight:700;margin:10px 0 5px}
input,textarea,select{width:100%;padding:11px;border:1px solid #ddd;border-radius:10px;font-size:14px;background:white}
textarea{min-height:62px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sec{border-top:1px solid #eee;margin-top:14px;padding-top:12px;font-weight:800;font-size:13px}
button{border:0;border-radius:11px;padding:11px;font-weight:800;font-size:12px;cursor:pointer}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.btns3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:8px}
.dark{background:#111;color:white}.light{background:#e5e5e5}.green{background:#dcfce7;color:#166534}.yellow{background:#fef3c7;color:#92400e}.red{background:#fee2e2;color:#991b1b}
#msg{margin-top:10px;background:#f4f4f5;border-radius:10px;padding:10px;font-size:12px;color:#555;white-space:pre-wrap;line-height:1.4}
.preview{overflow:auto}.invoice{width:794px;min-height:1123px;background:#fff;margin:auto;padding:44px;position:relative}
.top{display:flex;justify-content:space-between}.meta{font-size:15px;line-height:1.5}.logo{width:78px;height:78px;object-fit:contain}
.title{font-size:56px;font-weight:900;margin:16px 0 8px}.line{border:0;border-top:1.3px solid #777}
.billtitle{font-size:27px;margin:24px 0}.bill{font-size:19px;line-height:1.2;white-space:pre-line;margin-bottom:70px}
table{width:100%;border-collapse:collapse}.items th{text-align:left;font-size:23px;font-weight:500;border-bottom:1.5px solid #333;padding-bottom:10px}
.items th:nth-child(2),.items th:nth-child(3),.items td:nth-child(2),.items td:nth-child(3){text-align:right;width:160px}
.items td{font-size:19px;line-height:1.25;padding:34px 6px 16px;vertical-align:top}
.spacer{min-height:185px}.totallabel{text-align:right;font-size:23px;margin-top:25px}.total{font-size:28px;font-weight:900;text-align:right;margin-top:24px}
.pay{position:absolute;left:44px;right:44px;bottom:64px;display:grid;grid-template-columns:1fr 1fr;gap:20px;border-bottom:1.2px solid #777;padding-bottom:20px;align-items:end}
.pay h3{font-size:15px;margin:0 0 28px}.pay div{font-size:15px;line-height:1.4;white-space:pre-line}.gst{text-align:right;font-size:12px;color:#555}
@media(max-width:900px){.wrap{display:block}.preview{margin-top:14px}}
@media print{body{background:white;padding:0}.card:first-child{display:none}.wrap{display:block}.preview{box-shadow:none;border-radius:0;padding:0}.invoice{width:210mm;min-height:297mm;padding:12mm}}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
<h1>JT Invoice Lite</h1>
<p class="hint">Minimal version. Test connection first. Sheet stores clients, invoices, status, and invoice numbers.</p>

<div class="sec">Setup</div>
<label>Apps Script Web App URL</label><input id="url">
<label>Secret Key</label><input id="key" value="JT-PRIVATE-INVOICE-2026">
<div class="btns"><button class="light" onclick="saveSettings()">Save Settings</button><button class="dark" onclick="test()">Test</button></div>

<div class="sec">Invoice</div>
<div class="grid2"><div><label>Date</label><input id="date" type="date"></div><div><label>Invoice No</label><input id="invoiceNo" value="JT-002"></div></div>
<div class="btns"><button class="light" onclick="nextNo()">Next No</button><button class="light" onclick="retrieve()">Retrieve</button></div>

<div class="sec">Client</div>
<label>Saved Client</label><select id="clientList"><option value="">Select client</option></select>
<div class="btns"><button class="light" onclick="clients()">Load Clients</button><button class="dark" onclick="saveClient()">Save/Update</button></div>
<label>Name</label><input id="client">
<label>NDIS No</label><input id="ndis">
<label>Address</label><textarea id="address"></textarea>

<div class="sec">Service</div>
<label>Description</label><textarea id="desc">Individual Support Services,
Weekday Afternoon Shift</textarea>
<div class="grid2"><div><label>Start</label><input id="start" placeholder="3:00pm"></div><div><label>End</label><input id="end" placeholder="7:45pm"></div></div>
<div class="grid3"><div><label>Hours</label><input id="hours" type="number" step="0.01" value="4.75"></div><div><label>Rate</label><input id="rate" type="number" step="0.01" value="42"></div><div><label>KM</label><input id="km" type="number" step="0.1" value="0"></div></div>
<div class="grid2"><div><label>KM Rate</label><input id="kmRate" type="number" step="0.01" value="1"></div><div><label>KM</label><select id="kmMode"><option value="none">No KM</option><option value="separate">Separate</option><option value="bundled">Bundled</option></select></div></div>

<div class="sec">Bank, local only</div>
<label>Account Name</label><input id="accName" placeholder="Jason Torres Maghacot">
<label>Bank</label><input id="bank" placeholder="Commonwealth Bank">
<div class="grid2"><div><label>BSB</label><input id="bsb"></div><div><label>Account No</label><input id="accNo"></div></div>

<div class="btns3">
<button class="dark" onclick="saveInv('Draft')">Draft</button><button class="yellow" onclick="saveInv('Sent')">Sent</button><button class="green" onclick="saveInv('Paid')">Paid</button>
</div>
<div class="btns3">
<button class="light" onclick="saveInv('Archived')">Archive</button><button class="red" onclick="saveInv('Cancelled')">Cancel</button><button class="light" onclick="window.print()">PDF</button>
</div>
<div id="msg">Ready.</div>
</div>

<div class="card preview">
<div class="invoice">
<div class="top"><div class="meta"><div id="pDate"></div><div><b>Invoice No. <span id="pNo"></span></b></div><div><b>ABN: 54 852 785 661</b></div></div><img class="logo" src="jt-logo.jpeg"></div>
<div class="title">Invoice</div><hr class="line">
<div class="billtitle">Bill To:</div><div id="pBill" class="bill"></div>
<table class="items"><thead><tr><th>DESCRIPTION</th><th>QTY</th><th>AMOUNT</th></tr></thead><tbody id="pRows"></tbody></table>
<div class="spacer"></div><div class="totallabel">TOTAL</div><hr class="line"><div id="pTotal" class="total">$0.00</div>
<div class="pay"><div><h3>Payment Information</h3><div id="pPay"></div></div><div class="gst">No GST has been charged</div></div>
</div>
</div>
</div>

<script>
let CLIENTS=[];
function $(id){return document.getElementById(id)}
function msg(t){$("msg").textContent=t}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function money(n){return "$"+Number(n||0).toFixed(2)}
function dtext(s){return s?new Date(s+"T00:00:00").toLocaleDateString("en-AU",{day:"numeric",month:"long",year:"numeric"}):""}
function today(){let d=new Date();$("date").value=d.toISOString().slice(0,10)}
function saveSettings(){["url","key","accName","bank","bsb","accNo"].forEach(k=>localStorage.setItem("jt_"+k,$(k).value.trim()));msg("Settings saved on this device.")}
function loadSettings(){["url","key","accName","bank","bsb","accNo"].forEach(k=>{let v=localStorage.getItem("jt_"+k);if(v)$(k).value=v})}
function calc(){let h=+$("hours").value||0,r=+$("rate").value||0,km=+$("km").value||0,kr=+$("kmRate").value||0,mode=$("kmMode").value;let sup=h*r,kma=km*kr,total=sup,billed=h;if(mode==="separate")total+=kma;if(mode==="bundled"){total+=kma;billed=r?total/r:h}return{h,r,km,kr,mode,sup,kma,total,billed}}
function render(){let c=calc();$("pDate").textContent=dtext($("date").value);$("pNo").textContent=$("invoiceNo").value;$("pBill").innerHTML="<b>"+esc($("client").value||"Client Name")+"</b>\nNDIS No. "+esc($("ndis").value||"000000000")+"\n\n"+esc($("address").value||"Address\nAustralia");let desc=$("desc").value;if($("start").value||$("end").value)desc+="\n"+$("start").value+"–"+$("end").value;$("pRows").innerHTML="";if(c.mode==="bundled"){row(desc,c.billed.toFixed(2)+" hours",c.total)}else{row(desc,c.h.toFixed(2)+" hours",c.sup);if(c.mode==="separate"&&c.km>0)row("Participant Transport",c.km+" km",c.kma)}$("pTotal").textContent=money(c.total);$("pPay").textContent=($("accName").value||"Jason Torres Maghacot")+"\n"+($("bank").value||"Commonwealth Bank")+"\nBSB "+($("bsb").value||"")+"\nAccount Number "+($("accNo").value||"")}
function row(d,q,a){let tr=document.createElement("tr");tr.innerHTML="<td>"+esc(d).replace(/\n/g,"<br>")+"</td><td>"+esc(q)+"</td><td>"+money(a)+"</td>";$("pRows").appendChild(tr)}
function baseUrl(params){let base=$("url").value.trim();if(!base)throw Error("Missing Apps Script URL");let u=new URL(base);u.searchParams.set("secret",$("key").value.trim());Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,v==null?"":String(v)));return u.toString()}
function call(action,params,done){try{saveSettings();let cb="cb"+Date.now()+Math.floor(Math.random()*9999);window[cb]=r=>{done(r);delete window[cb]};let s=document.createElement("script");s.src=baseUrl({...params,action,callback:cb});s.onerror=()=>msg("Request failed. Check deployment access = Anyone, new version deployed, URL, and key.");document.body.appendChild(s);setTimeout(()=>s.remove(),15000)}catch(e){msg(e.message)}}
function test(){msg("Testing...");call("test",{},r=>msg(r&&r.ok?"Connected to sheet: "+r.sheet:"Failed: "+(r&&r.error||"Unknown")))}
function nextNo(){msg("Getting next invoice...");call("nextInvoice",{},r=>{if(r&&r.ok){$("invoiceNo").value=r.nextInvoice;render();msg("Next invoice: "+r.nextInvoice)}else msg("Failed: "+(r&&r.error||"Unknown"))})}
function clients(){msg("Loading clients...");call("getClients",{},r=>{if(r&&r.ok){CLIENTS=r.clients||[];$("clientList").innerHTML='<option value="">Select client</option>';CLIENTS.forEach((c,i)=>{let o=document.createElement("option");o.value=i;o.textContent=c.client+" | "+(c.ndisNo||"No NDIS");$("clientList").appendChild(o)});msg("Loaded "+CLIENTS.length+" clients.")}else msg("Could not load clients: "+(r&&r.error||"Unknown"))})}
function saveClient(){msg("Saving client...");call("saveClient",{client:$("client").value,ndisNo:$("ndis").value,address:$("address").value},r=>{if(r&&r.ok){msg("Client saved.");clients()}else msg("Client failed: "+(r&&r.error||"Unknown"))})}
function data(status){let c=calc();return{date:$("date").value,invoiceNo:$("invoiceNo").value,client:$("client").value,ndisNo:$("ndis").value,address:$("address").value,description:$("desc").value+(($("start").value||$("end").value)?"\n"+$("start").value+"–"+$("end").value:""),actualHours:c.h,billedHours:c.mode==="bundled"?c.billed.toFixed(2):c.h.toFixed(2),rate:c.r,km:c.km,kmRate:c.kr,kmHandling:c.mode,amount:c.total.toFixed(2),status,notes:c.mode==="bundled"?"KM bundled into hours":""}}
function saveInv(status){msg("Saving "+status+"...");call("saveInvoice",data(status),r=>{if(r&&r.ok){msg(status+" saved: "+r.invoiceNo+"\nNext: "+r.nextInvoice);$("invoiceNo").value=r.nextInvoice;render()}else msg("Save failed: "+(r&&r.error||"Unknown"))})}
function retrieve(){let no=$("invoiceNo").value.trim();if(!no)return msg("Enter invoice number.");msg("Retrieving...");call("getInvoice",{invoiceNo:no},r=>{if(r&&r.ok&&r.invoice){let x=r.invoice;$("date").value=x.date||$("date").value;$("invoiceNo").value=x.invoiceNo||"";$("client").value=x.client||"";$("ndis").value=x.ndisNo||"";$("address").value=x.address||"";$("desc").value=x.description||"";$("hours").value=x.actualHours||"";$("rate").value=x.rate||"";$("km").value=x.km||0;$("kmRate").value=x.kmRate||1;$("kmMode").value=x.kmHandling||"none";render();msg("Retrieved "+no)}else msg("Not found or failed: "+(r&&r.error||no))})}
$("clientList").addEventListener("change",()=>{let c=CLIENTS[+$("clientList").value];if(c){$("client").value=c.client||"";$("ndis").value=c.ndisNo||"";$("address").value=c.address||"";render()}});
document.addEventListener("input",render);document.addEventListener("change",render);today();loadSettings();render();
</script>
</body>
</html>
